name: synthrare
region: nyc

services:
  - name: backend
    github:
      repo: your-org/synthrare
      branch: main
      deploy_on_push: true
    source_dir: backend
    dockerfile_path: backend/Dockerfile
    http_port: 8000
    instance_size_slug: basic-s
    envs:
      - key: APP_ENV
        value: production
      - key: DATABASE_URL
        value: "${synthrare-db.DATABASE_URL}"
      - key: REDIS_URL
        value: "${synthrare-cache.REDIS_URL}"
      - key: SECRET_KEY
        type: SECRET
      - key: DO_SPACES_KEY
        type: SECRET
      - key: DO_SPACES_SECRET
        type: SECRET
      - key: DO_GRADIENT_API_KEY
        type: SECRET
    health_check:
      http_path: /health

  - name: worker
    github:
      repo: your-org/synthrare
      branch: main
    source_dir: backend
    dockerfile_path: backend/Dockerfile
    instance_size_slug: basic-m
    run_command: rq worker --url $REDIS_URL generation
    envs:
      - key: DATABASE_URL
        value: "${synthrare-db.DATABASE_URL}"
      - key: REDIS_URL
        value: "${synthrare-cache.REDIS_URL}"

static_sites:
  - name: frontend
    github:
      repo: your-org/synthrare
      branch: main
    source_dir: frontend
    build_command: npm run build
    output_dir: .next
    envs:
      - key: NEXT_PUBLIC_API_URL
        value: "https://synthrare-backend.ondigitalocean.app"

databases:
  - name: synthrare-db
    engine: PG
    version: "15"
    size: db-s-1vcpu-1gb
  - name: synthrare-cache
    engine: VALKEY
    version: "7"
    size: db-s-1vcpu-1gb
