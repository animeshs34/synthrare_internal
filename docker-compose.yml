services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: synthrare
      POSTGRES_USER: synthrare
      POSTGRES_PASSWORD: synthrare_dev
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U synthrare"]
      interval: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      retries: 5

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://synthrare:synthrare_dev@postgres:5432/synthrare
      REDIS_URL: redis://redis:6379/0
      USE_LOCAL_STORAGE: "true"
      LOCAL_STORAGE_PATH: /data/uploads
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - ./data:/data
    command: >
      sh -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"

  worker:
    build: ./backend
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://synthrare:synthrare_dev@postgres:5432/synthrare
      REDIS_URL: redis://redis:6379/0
      USE_LOCAL_STORAGE: "true"
      LOCAL_STORAGE_PATH: /data/uploads
    depends_on:
      - backend
    volumes:
      - ./backend:/app
      - ./data:/data
    command: rq worker --url redis://redis:6379/0 generation

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
    volumes:
      - ./frontend:/app
      # Preserve node_modules from the image (don't let host mount overwrite them)
      - /app/node_modules
    command: npm run dev

volumes:
  postgres_data:
